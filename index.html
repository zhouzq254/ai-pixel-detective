<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Detective Agency - AI Mystery Game</title>
    <meta name="description" content="Solve AI-generated mystery cases in this global detective game. Free to play with premium features.">
    <meta name="keywords" content="detective, mystery, game, AI, puzzle, investigation">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
            color: #e0e0ff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        #root {
            min-height: 100vh;
        }
        
        .loading-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .loading-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        .loading-text {
            font-size: 1.5rem;
            color: #4affaa;
            margin-bottom: 10px;
        }
        
        .loading-subtext {
            color: #a0a0ff;
            font-size: 1rem;
            max-width: 500px;
            line-height: 1.6;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 游戏加载完成后的样式 */
        .game-loaded .loading-screen {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <div class="loading-icon">🕵️‍♂️</div>
            <div class="loading-text">Loading Global Detective Agency...</div>
            <div class="loading-subtext">
                Preparing AI-generated mystery cases for your investigation.
                This game is built with modern React technology - no Phaser scene switching issues.
            </div>
        </div>
    </div>
    
    <script type="module" src="/src/index.tsx"></script>
    
    <script>
        // 游戏加载完成后隐藏加载屏幕
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('game-loaded');
            }, 1000);
        });
        
        // 错误处理
        window.addEventListener('error', (event) => {
            console.error('Game error:', event.error);
            const loadingScreen = document.querySelector('.loading-screen');
            if (loadingScreen) {
                loadingScreen.innerHTML = `
                    <div class="loading-icon">❌</div>
                    <div class="loading-text">Error Loading Game</div>
                    <div class="loading-subtext">
                        There was an error loading the game. Please refresh the page.
                        <br><br>
                        Error: ${event.error.message}
                    </div>
                    <button onclick="window.location.reload()" style="
                        margin-top: 20px;
                        background: #4a4aff;
                        color: white;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 20px;
                        cursor: pointer;
                        font-size: 1rem;
                    ">
                        Refresh Page
                    </button>
                `;
            }
        });
    </script>
</body>
</html>
